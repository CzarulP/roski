services:
  db:
    image: postgis/postgis:16-3.4
    container_name: roski-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: roski
      POSTGRES_PASSWORD: roski
      POSTGRES_DB: roski
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roski -d roski"]
      interval: 5s
      timeout: 5s
      retries: 10
